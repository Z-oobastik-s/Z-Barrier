#
#   Границы миров (WorldBorder): размер, центр, блокировки, предупреждения,
#   динамическое сжатие / рост. Каждый Bukkit-мир = своя отдельная граница.
#
#   Автор:        Zoobastiks
#   Поддержка:   https://t.me/Zoobastiks
#
# ------------------------------------------------------------------------------
#   Права (LuckPerms и др.)
# ------------------------------------------------------------------------------
#
#   zbarrier.admin
#       Сейчас это единственное право, которое проверяет исполнитель команд:
#       без него любая подкоманда ответит «нет прав». Ставьте администраторам
#       границ и тем, кто настраивает сервер.
#
#   zbarrier.reload
#       Объявлено в plugin.yml (по умолчанию OP), но отдельно в коде команды
#       пока не проверяется - на практике reload тоже требует zbarrier.admin.
#
# ------------------------------------------------------------------------------
#   Команды: кому и зачем
# ------------------------------------------------------------------------------
#
#   Кто пользуется:
#       Администраторы сервера (консоль или игрок с правом). Обычным игрокам
#       эти команды не нужны - они только меняют границы и конфигурацию.
#
#   Как вызывать:
#       /zbarrier <подкоманда> [аргументы…]     или коротко:   /zb …
#
#   Когда плагин «выключен» (settings.plugin-enabled: false):
#       Работают только  reload  и  debugwhere  чтобы поднять конфиг или
#       проверить мир без включения плагина. Остальные подкоманды ответят,
#       что плагин отключён в конфиге.
#
# ------------------------------------------------------------------------------
#   help
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier help      или   /zbarrier   (без аргументов)
#   Для кого:    тот же, у кого есть права (см. выше).
#   Что делает:  в чат (или консоль) выводится краткий список строк из
#                messages.yml - это шпаргалка по синтаксису, не правит файлы.
#
# ------------------------------------------------------------------------------
#   reload
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier reload
#   Для кого:    админ; из консоли тоже можно (если консоль имеет права).
#   Что делает:  заново читает config.yml и messages.yml с диска, обновляет
#                настройки в памяти, заново применяет границы к загруженным
#                мирам и перезапускает задачи dynamic по новому конфигу.
#   Когда:       после любого ручного редактирования конфигов на диске.
#
# ------------------------------------------------------------------------------
#   debugwhere
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier debugwhere
#   Для кого:    только игрок (не консоль) - нужна ваша позиция в мире.
#   Что делает:  показывает, как сервер видит ваш текущий мир: имя мира,
#                ключ измерения (minecraft:overworld и т.д.), env, диаметр
#                и центр WorldBorder именно этого мира. Полезно, когда
#                «вроде в world», а /worldborder get не совпадает - часто
#                игрок в другом измерении (другой World).
#   Дополнительно: при debug: true в config в консоль пишется строка лога.
#
# ------------------------------------------------------------------------------
#   setsize
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier setsize <имя_мира> <диаметр>
#   Пример:      /zbarrier setsize world 10000
#   Для кого:    админ; мир должен быть загружен и иметь секцию в worlds в конфиге.
#   Что делает:  записывает новый размер границы в config (и внутреннюю модель),
#                сразу применяет к WorldBorder этого мира через API. Диаметр
#                ограничивается settings.min-size и settings.max-size.
#
# ------------------------------------------------------------------------------
#   setcenter
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier setcenter <имя_мира> <x> <z>
#   Пример:      /zbarrier setcenter world 0 0
#   Для кого:    админ.
#   Что делает:  ставит режим центра MANUAL и координаты центра границы по X/Z,
#                сохраняет в конфиг, применяет границу к миру.
#
# ------------------------------------------------------------------------------
#   setcenterhere
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier setcenterhere [имя_мира]
#   Пример:      /zbarrier setcenterhere          - центр границы текущего мира
#                                                 в вашей точке X/Z.
#                /zbarrier setcenterhere orcish  - центр границы мира orcish
#                                                 ставится в ваши текущие X и Z
#                                                 (откуда вы стоите, в любом мире).
#   Для кого:    только игрок (нужны ваши координаты).
#   Что делает:  режим MANUAL, в конфиг и в WorldBorder выбранного мира.
#
# ------------------------------------------------------------------------------
#   autocenter
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier autocenter <имя_мира>
#   Для кого:    админ.
#   Что делает:  переключает центр в режим AUTO: при применении границы центр
#                берётся с точки spawn этого мира. Пишет в конфиг и применяет.
#
# ------------------------------------------------------------------------------
#   enable  /  disable
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier enable <имя_мира>     /zbarrier disable <имя_мира>
#   Для кого:    админ.
#   Что делает:  включает или выключает обработку этого мира плагином для
#                worlds.<мир>.enabled. После disable плагин не будет применять
#                к нему границу и ограничения по этой настройке (см. код).
#
# ------------------------------------------------------------------------------
#   warning
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier warning <имя_мира> <блоки>
#   Пример:      /zbarrier warning world 30
#   Для кого:    админ; секция мира в конфиге должна существовать (мир может
#                быть не загружен - проверка только по конфигу).
#   Что делает:  меняет warning.distance: за сколько блоков до края границы
#                слать игроку предупреждение (если warning.enabled true).
#
# ------------------------------------------------------------------------------
#   dynamic
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier dynamic <имя_мира> <grow|shrink> <шаг> <интервал_сек>
#                         <min_диаметр> <max_диаметр>
#   Пример:      /zbarrier dynamic world shrink 1 3600 500 60000000
#   Для кого:    админ; мир загружен; мир должен быть разрешён в
#                settings.dynamic-allowed-worlds; в конфиге должна быть
#                секция этого мира.
#   Что делает:  включает динамику для мира: периодически увеличивает или
#                уменьшает диаметр на <шаг> каждые <интервал_сек> секунд,
#                не выходя за min/max. Параметры пишутся в конфиг, запускается
#                таймер; игрокам может уйти broadcast из messages.yml.
#   Ошибки:      если мир не в dynamic-allowed-worlds - сообщение dynamic-world-not-allowed.
#
# ------------------------------------------------------------------------------
#   dynamicstop
# ------------------------------------------------------------------------------
#   Синтаксис:   /zbarrier dynamicstop <имя_мира>
#   Для кого:    админ.
#   Что делает:  выключает dynamic.enabled для мира в конфиге, останавливает
#                таймер этого мира. Граница остаётся текущего размера, просто
#                перестаёт меняться сама по расписанию.
#
################################################################################


# ==============================================================================
#  debug
# ==============================================================================
#
#  Что делает:
#      В консоль сервера пишутся подробные сообщения: вызов applyWorldBorder,
#      размер и центр до/после API, снимок границ по всем загруженным мирам.
#
#  Значения:  true | false
#
#  Когда выключать:
#      На продакшене, если логи засоряются (особенно при частом dynamic).
#
#  Важно про границу в игре:
#      Команда /minecraft:worldborder get показывает границу ТОГО измерения,
#      в котором сейчас стоит игрок. Мир «world» и кастомный «orcish» - разные
#      миры, у каждого свой размер границы. Проверка: /zbarrier debugwhere
#
debug: false


# ==============================================================================
#  settings - глобальные настройки плагина
# ==============================================================================
settings:

  # --------------------------------------------------------------------------
  #  plugin-enabled
  # --------------------------------------------------------------------------
  #  Главный выключатель плагина.
  #  true - слушатели, команды (кроме reload и debugwhere), применение границ,
  #          динамика работают по конфигу.
  #  false - плагин не применяет ограничения и не крутит dynamic; игроки не
  #          режутся границей через этот плагин. После смены: /zbarrier reload
  # --------------------------------------------------------------------------
  plugin-enabled: true

  # --------------------------------------------------------------------------
  #  enforce-barrier
  # --------------------------------------------------------------------------
  #  Включить блокировки движения / транспорта у границы (слушатели плагина).
  #  false - граница ванильная может оставаться, но плагин не откатывает игрока
  #          при выходе за предел.
  # --------------------------------------------------------------------------
  enforce-barrier: true

  # --------------------------------------------------------------------------
  #  prevent-outside-teleport
  # --------------------------------------------------------------------------
  #  Запрет телепортации за пределы границы (перлы, команды и т.п., если идёт
  #          через события, которые обрабатывает плагин).
  # --------------------------------------------------------------------------
  prevent-outside-teleport: true

  # --------------------------------------------------------------------------
  #  pullback-distance
  # --------------------------------------------------------------------------
  #  На сколько блоков внутрь отодвинуть игрока, если он «вылез» за границу
  #          при движении. Тип: число > 0 (дробное можно).
  # --------------------------------------------------------------------------
  pullback-distance: 5.5

  # --------------------------------------------------------------------------
  #  default-size
  # --------------------------------------------------------------------------
  #  Используется ТОЛЬКО при автосоздании полной секции мира (см. ниже про
  #          «новые миры»): в прописанный размер границы для нового мира.
  #          Это полный диаметр (не радиус). Пример: 300000 → 150000 блоков
  #          от центра до края по оси.
  # --------------------------------------------------------------------------
  default-size: 300000.0

  # --------------------------------------------------------------------------
  #  min-size  /  max-size
  # --------------------------------------------------------------------------
  #  Жёсткие пределы для размера границы в плагине (команды, конфиг, dynamic).
  #          Не путать с dynamic.min-size / dynamic.max-size внутри мира.
  #          Ванильный максимум границы Minecraft - 60000000.
  # --------------------------------------------------------------------------
  min-size: 16.0
  max-size: 6.0E7

  # --------------------------------------------------------------------------
  #  warning-cooldown-seconds
  # --------------------------------------------------------------------------
  #  Минимальный интервал (секунды) между сообщениями «приближение к границе»
  #          для одного игрока. 0 - без кулдауна (может спамить).
  # --------------------------------------------------------------------------
  warning-cooldown-seconds: 3

  # --------------------------------------------------------------------------
  #  warning-distance-default
  # --------------------------------------------------------------------------
  #  Подставляется в настройки мира, когда для мира не задано своё
  #          warning.distance и срабатывает старая логика дефолтов в коде.
  #          При использовании world-defaults обычно дистанция задаётся там.
  # --------------------------------------------------------------------------
  warning-distance-default: 50.0

  # --------------------------------------------------------------------------
  #  auto-create-world-section
  # --------------------------------------------------------------------------
  #  true - при каждой загрузке конфига плагин смотрит список загруженных
  #          миров сервера (Bukkit.getWorlds()). Если для какого-то мира ещё
  #          нет ключа worlds.<имя_мира>, плагин ДОБАВЛЯЕТ его в config.yml
  #          и сохраняет файл.
  #
  #          КАК ИМЕННО выглядит новая секция - два режима:
  #
  #          А) Блок world-defaults НИЖЕ непустой (есть хотя бы один ключ):
  #             создаётся короткая запись без вложенных полей, в YAML это
  #             выглядит как:   новый_мир: {}
  #             Смысл: «все параметры возьми из world-defaults». Отличия потом
  #             дописываете под worlds.новый_мир вручную.
  #
  #          Б) world-defaults отсутствует или полностью пустой:
  #             плагин прописывает ПОЛНУЮ секцию (enabled, center-mode, center,
  #             size = default-size, warning, action, dynamic) - как раньше,
  #             без шаблона.
  #
  #  false - автоматически ничего не создаётся; мир без секции в worlds
  #          для плагина «не настроен» (не попадёт в карту настроек так же,
  #          как настроенные миры - см. код BarrierService для отсутствующих).
  #
  # --------------------------------------------------------------------------
  auto-create-world-section: true

  # --------------------------------------------------------------------------
  #  auto-center-new-worlds
  # --------------------------------------------------------------------------
  #  Влияет только на режим Б) выше: при первой автозаписи полной секции мира
  #          center-mode будет AUTO (центр от spawn) или MANUAL с координатами
  #          спавна в center.x / center.z.
  # --------------------------------------------------------------------------
  auto-center-new-worlds: true

  # --------------------------------------------------------------------------
  #  dynamic-allowed-worlds
  # --------------------------------------------------------------------------
  #  Первый уровень допуска динамики: список имён миров ИЛИ одна строка "*"
  #          (все миры). Второй уровень - worlds.<мир>.dynamic.enabled
  #          (после слияния с world-defaults). Оба должны разрешать, иначе
  #          задача dynamic для этого мира не запускается.
  #
  #  Пример без звёздочки:
  #      dynamic-allowed-worlds:
  #        - world
  #        - world_nether
  #
  # --------------------------------------------------------------------------
  dynamic-allowed-worlds:
    - "*"


# ==============================================================================
#  world-defaults - общий шаблон для ВСЕХ миров из секции worlds
# ==============================================================================
#
#  Как это читается кодом:
#      Для каждого worlds.<имя> строится ИТОГОВАЯ конфигурация = сначала копия
#      world-defaults (если блок не пустой), поверх - ваши ключи из worlds.<имя>.
#      Вложенные карты сливаются глубоко: можно переопределить только
#      dynamic.step, не копируя весь dynamic.
#
#  Пример:
#      world-defaults.dynamic.enabled: true
#      worlds.lobby.dynamic.enabled: false   → у lobby динамика выключена,
#      остальное у lobby как в шаблоне (если не переопределено).
#
#  Пустой мир в списке:
#      world_nether: {}
#      значит «всё как в world-defaults», ноль дублирования строк.
#
world-defaults:

  # Включена ли логика границы этого мира (применение размера/центра, блокировки).
  enabled: true

  # AUTO - центр границы берётся с точки spawn мира при применении.
  # MANUAL - центр из center.x и center.z ниже.
  center-mode: AUTO

  center:
    # При MANUAL - координаты центра границы по X и Z (Y у границы не задаётся).
    # При AUTO эти числа в файле не используются при расчёте границы.
    x: 0.0
    z: 0.0

  # Диаметр границы в блоках (целое или дробное). Ограничивается min-size / max-size из settings.
  size: 300000.0

  warning:
    # Включить сообщение игроку, когда он близко к краю границы.
    enabled: true
    # За сколько блоков до края (или меньше) слать предупреждение.
    distance: 25.0

  action:
    # Блокировать обычный ход через границу (откат внутрь).
    deny-move: true
    # Блокировать телепорт за границу (где перехватывает плагин).
    deny-teleport: true
    # Блокировать выезд лодки / вагонетки и т.д. за границу.
    deny-vehicle: true

  dynamic:
    # Локально включить динамическое изменение размера границы этого мира.
    enabled: true
    # GROW - расти, SHRINK - сжиматься, в пределах min-size / max-size ниже.
    mode: SHRINK
    # На сколько блоков изменить диаметр за один шаг задачи.
    step: 5400.0
    # Пауза между шагами в секундах (целое число). 3600 = раз в час.
    interval-seconds: 3600
    # Пределы динамики (диаметр); не выйти ниже / выше при автоматическом изменении.
    min-size: 500.0
    max-size: 6.0E7


# ==============================================================================
#  worlds - только отличия от world-defaults (ключ = имя мира на сервере)
# ==============================================================================
#
#  Имя мира должно совпадать с тем, что в /zbarrier setsize <мир> и в логах
#  сервера (папка мира, не «псевдоним» из мультиверса, если другое имя).
#
worlds:

  # Основной мир: другой режим центра, другой радиус предупреждения; dynamic из шаблона.
  world:
    center-mode: MANUAL
    center:
      x: 0.0
      z: 0.0
    size: 300000.0
    warning:
      distance: 20.0

  # Полностью как world-defaults - в YAML допустима пустая карта:
  world_nether: {}
  world_the_end: {}
  world_yggdrasil_ginnungagap: {}
  orcish: {}

  # Только сдвиг центра Z относительно шаблона (остальное из world-defaults).
  world_kattersstructures_deep_blue:
    center:
      z: 11.0

  # Лобби: свой center.z и динамика выключена, хотя в шаблоне она включена.
  lobby:
    center:
      z: 2.0
    dynamic:
      enabled: false
